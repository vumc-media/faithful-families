<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Faithful Families RSVP</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
padding:30px;
}

.card{
max-width:600px;
width:100%;
background:#101a33;
padding:24px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.toggle{
display:flex;
gap:10px;
margin-bottom:20px;
}

.toggle button{
flex:1;
padding:12px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

.attend.active{
background:#2dd4bf;
color:#06101f;
}

.decline.active{
background:#fb7185;
color:#06101f;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #333;
background:#1b2444;
color:white;
}

.submit{
background:#7aa2ff;
border:none;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}

.status{margin-top:15px;}
.ok{color:#2dd4bf;}
.err{color:#fb7185;}
</style>
</head>

<body>

<div class="card">

<h2>Faithful Families RSVP</h2>
<p>Wednesday at 5:00 PM • Dinner Provided</p>

<div class="toggle">
<button id="attendBtn" class="attend active">I'm Attending</button>
<button id="declineBtn" class="decline">I Cannot Attend</button>
</div>

<form id="form">

<div id="fields">

<input id="name" placeholder="Full Name">
<input id="mobile" placeholder="Mobile Number">
<input id="partySize" type="number" min="1" placeholder="Number in Party">

</div>

<button class="submit" type="submit">Submit Response</button>

<div id="status" class="status"></div>

</form>

</div>

<script>

const ENDPOINT = "https://script.google.com/macros/s/AKfycbzVRqeJDv8XFq94tYP2QsnmyewD7Vzw29V1dJzEGJhvO4FlSxUpm838dAr6c0YpxgXVfg/exec";

let statusValue = "Attending";

const attendBtn = document.getElementById("attendBtn");
const declineBtn = document.getElementById("declineBtn");
const fields = document.getElementById("fields");
const statusDiv = document.getElementById("status");

attendBtn.onclick = (e)=>{
e.preventDefault();
statusValue="Attending";
attendBtn.classList.add("active");
declineBtn.classList.remove("active");
fields.classList.remove("hidden");
};

declineBtn.onclick = (e)=>{
e.preventDefault();
statusValue="Declined";
declineBtn.classList.add("active");
attendBtn.classList.remove("active");
fields.classList.add("hidden");
};

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let payload;

if(statusValue==="Attending"){

const name=document.getElementById("name").value.trim();
const mobile=document.getElementById("mobile").value.trim();
const partySize=document.getElementById("partySize").value;

if(!name || !mobile || !partySize){
statusDiv.textContent="Please complete all fields.";
statusDiv.className="status err";
return;
}

payload={
name,
mobile,
partySize,
status:"Attending"
};

}else{

payload={
name:"Declined (anonymous)",
mobile:"",
partySize:0,
status:"Declined"
};

}

try{
const res=await fetch(ENDPOINT,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(payload)
});

const result=await res.json();

if(result.ok){
statusDiv.textContent="Thank you! Your response has been recorded.";
statusDiv.className="status ok";
document.getElementById("form").reset();
}else{
throw new Error(result.error);
}

}catch(err){
statusDiv.textContent="Submission failed.";
statusDiv.className="status err";
}

});

</script>

</body>
</html>
