<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Faithful Families RSVP</title>
  <style>
    :root{--bg:#0b1220;--card:#101a33;--text:#e8eefc;--muted:#a9b7dd;--ok:#2dd4bf;--err:#fb7185;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:24px;}
    .card{max-width:720px;width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.35);}
    h1{margin:0 0 8px;font-size:28px;}
    p{margin:0 0 14px;color:var(--muted);line-height:1.4}
    .toggle{display:flex;gap:10px;margin:14px 0 18px;}
    .toggle button{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(16,26,51,.65);color:var(--text);cursor:pointer;font-weight:800}
    .toggle button.active.attend{background:linear-gradient(135deg,#7aa2ff,#2dd4bf);color:#06101f;border:0}
    .toggle button.active.decline{background:linear-gradient(135deg,#fb7185,#f97316);color:#06101f;border:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:640px){.grid{grid-template-columns:1fr;}}
    label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px;}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(16,26,51,.65);color:var(--text);font-size:16px;outline:none;}
    .actions{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap;}
    .submit{border:0;background:linear-gradient(135deg,#7aa2ff,#2dd4bf);color:#06101f;font-weight:900;padding:12px 16px;border-radius:12px;cursor:pointer;font-size:15px;}
    .status{margin-top:14px;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(16,26,51,.55);display:none;font-size:14px;line-height:1.35}
    .status.ok{display:block;border-color:rgba(45,212,191,.6);color:var(--text)}
    .status.err{display:block;border-color:rgba(251,113,133,.6);color:var(--text)}
    .hidden{display:none;}
    .req{color:rgba(251,113,133,.95);font-weight:800;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Faithful Families RSVP</h1>
    <p>Please respond for <strong>Wednesday April 15 at 5:00 PM</strong>. Dinner is provided — knowing the count helps us prepare.</p>

    <div class="toggle">
      <button type="button" id="attendBtn" class="active attend">I'm Attending</button>
      <button type="button" id="declineBtn" class="decline">I Cannot Attend</button>
    </div>

    <!-- Hidden iframe target to avoid page redirect + bypass CORS -->
    <iframe name="hidden_iframe" id="hidden_iframe" class="hidden"></iframe>

    <form id="rsvpForm"
      action="https://script.google.com/macros/s/AKfycbzVRqeJDv8XFq94tYP2QsnmyewD7Vzw29V1dJzEGJhvO4FlSxUpm838dAr6c0YpxgXVfg/exec"
      method="POST"
      target="hidden_iframe">

      <!-- Always submitted -->
      <input type="hidden" name="eventName" value="Faithful Families">
      <input type="hidden" name="eventDateTime" value="Wednesday at 5:00 PM">
      <input type="hidden" name="status" id="statusField" value="Attending">

      <div id="attendFields">
        <div class="grid">
          <div>
            <label>Name <span class="req">*</span></label>
            <input name="name" id="name" autocomplete="name" placeholder="First and last name">
          </div>
          <div>
            <label>Number in party <span class="req">*</span></label>
            <input name="partySize" id="partySize" type="number" min="1" step="1" placeholder="e.g., 3">
          </div>
          <div style="grid-column: 1 / -1;">
            <label>Mobile number <span class="req">*</span></label>
            <input name="mobile" id="mobile" autocomplete="tel" inputmode="tel" placeholder="(555) 555-5555">
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="submit" type="submit" id="submitBtn">Submit Response</button>
      </div>

      <div id="statusMsg" class="status"></div>
    </form>
  </div>

  <script>
    const attendBtn = document.getElementById("attendBtn");
    const declineBtn = document.getElementById("declineBtn");
    const attendFields = document.getElementById("attendFields");
    const statusField = document.getElementById("statusField");
    const statusMsg = document.getElementById("statusMsg");
    const form = document.getElementById("rsvpForm");

    let mode = "Attending";

    function setMode(newMode){
      mode = newMode;
      statusField.value = newMode;

      if(newMode === "Attending"){
        attendBtn.classList.add("active","attend");
        declineBtn.classList.remove("active","decline");
        attendFields.classList.remove("hidden");
      } else {
        declineBtn.classList.add("active","decline");
        attendBtn.classList.remove("active","attend");
        attendFields.classList.add("hidden");
      }
      // clear messages
      statusMsg.className = "status";
      statusMsg.textContent = "";
    }

    attendBtn.addEventListener("click", () => setMode("Attending"));
    declineBtn.addEventListener("click", () => setMode("Declined"));

    // show success after iframe load (best-effort)
    const iframe = document.getElementById("hidden_iframe");
    iframe.addEventListener("load", () => {
      statusMsg.className = "status ok";
      statusMsg.textContent = "Thanks! Your response has been recorded.";
      form.reset();
      // keep the current mode after reset
      statusField.value = mode;
      if(mode === "Declined") attendFields.classList.add("hidden");
    });

    form.addEventListener("submit", (e) => {
      if(mode === "Attending"){
        const name = document.getElementById("name").value.trim();
        const partySize = document.getElementById("partySize").value.trim();
        const mobile = document.getElementById("mobile").value.trim();

        if(!name || !partySize || !mobile){
          e.preventDefault();
          statusMsg.className = "status err";
          statusMsg.textContent = "Please complete name, party size, and mobile number.";
          return;
        }
      } else {
        // Declined = no data needed; wipe fields so they aren't submitted
        document.getElementById("name").value = "";
        document.getElementById("partySize").value = "";
        document.getElementById("mobile").value = "";
      }

      statusMsg.className = "status ok";
      statusMsg.textContent = "Submitting…";
    });
  </script>
</body>
</html>
